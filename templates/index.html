<!DOCTYPE html>
<html>
<head>
    <title>AI Study Buddy</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>AI Study Buddy</h1>

<h2>Explain Topic</h2>
<input id="topic" placeholder="Enter topic">
<button onclick="explain()">Explain</button>

<h2>Summarize Notes</h2>
<textarea id="notes" placeholder="Paste notes"></textarea>
<button onclick="summarize()">Summarize</button>

<h2>Generate Quiz</h2>
<input id="quizTopic" placeholder="Quiz topic">
<button onclick="quiz()">Generate Quiz</button>

<h2>Result</h2>
<div id="result"></div>

<script src="/static/script.js"></script>

</body>
</html>
